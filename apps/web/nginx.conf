# Redirect scheme: https in production (behind the TLS proxy, which sets
# X-Forwarded-Proto), the request scheme otherwise (e.g. http://localhost in CI).
map $http_x_forwarded_proto $redirect_scheme {
  default $scheme;
  https   https;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cache-Control "no-cache" always;

  # Proxied SSR pages also receive the API's own security headers; strip them so
  # each response carries a single, consistent set from this nginx layer.
  proxy_hide_header X-Frame-Options;
  proxy_hide_header Referrer-Policy;
  proxy_hide_header X-Content-Type-Options;
  proxy_hide_header Permissions-Policy;

  error_page 404 /404.html;
  location = /404.html {
    internal;
    add_header Cache-Control "no-cache" always;
  }

  # Dynamic sitemap served by the API (published listings + static routes).
  location = /sitemap.xml {
    rewrite ^ /api/v1/sitemap.xml break;
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /index.html {
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cache-Control "no-cache";
  }

  location = / {
    try_files /index.html =404;
  }

  location = /favicon.ico {
    default_type image/svg+xml;
    try_files /favicon.svg =404;
  }

  location ~* \.(php|asp|aspx|jsp|cgi)$ {
    return 404;
  }

  location = /admin {
    auth_request /_cofind_staff_auth;
    error_page 401 = @cofind_auth_redirect;
    error_page 403 = @cofind_me_redirect;
    try_files /admin/index.html =404;
  }

  location = /admin/ {
    auth_request /_cofind_staff_auth;
    error_page 401 = @cofind_auth_redirect;
    error_page 403 = @cofind_me_redirect;
    try_files /admin/index.html =404;
  }

  location = /_cofind_staff_auth {
    internal;
    proxy_pass http://api:4000/api/v1/auth/require-staff;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Original-URI $request_uri;
  }

  location @cofind_auth_redirect {
    return 302 $redirect_scheme://$http_host/auth;
  }

  location @cofind_me_redirect {
    return 302 $redirect_scheme://$http_host/me;
  }

  # Feed: server-side render the first page of cards via SSI (the API returns the
  # cards fragment); the SPA then hydrates filters and pagination on top.
  location ~ ^/feed/?$ {
    ssi on;
    try_files /feed/index.html =404;
  }

  location = /_feed_cards {
    internal;
    rewrite ^ /api/v1/listings/feed-cards break;
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/(chat|auth|suggestions|help|rules|privacy|contacts)/?$ {
    try_files /$1/index.html =404;
  }

  # Guests (no readable session hint cookie) are redirected to the auth form
  # instead of rendering a protected skeleton + a second /auth form on one page.
  # This is a UX/SEO layer only; the real access control is the API auth guard.
  location = /me {
    if ($cookie_cofind_auth != "1") {
      return 302 $redirect_scheme://$http_host/auth?next=/me;
    }
    try_files /me/index.html =404;
  }

  location = /me/appearance {
    if ($cookie_cofind_auth != "1") {
      return 302 $redirect_scheme://$http_host/auth?next=/me/appearance;
    }
    try_files /me/appearance/index.html =404;
  }

  location = /me/listings/new {
    if ($cookie_cofind_auth != "1") {
      return 302 $redirect_scheme://$http_host/auth?next=/me/listings/new;
    }
    try_files /me/listings/new/index.html =404;
  }

  location = /me/inbox {
    if ($cookie_cofind_auth != "1") {
      return 302 $redirect_scheme://$http_host/auth?next=/me/inbox;
    }
    try_files /me/inbox/index.html =404;
  }

  location = /me/subscription {
    if ($cookie_cofind_auth != "1") {
      return 302 $redirect_scheme://$http_host/auth?next=/me/subscription;
    }
    try_files /me/subscription/index.html =404;
  }

  location = /reports/new {
    if ($cookie_cofind_auth != "1") {
      return 302 $redirect_scheme://$http_host/auth?next=/reports/new;
    }
    try_files /reports/new/index.html =404;
  }

  # Server-rendered listing detail page (/listings/<slug>): proxied to the API,
  # which returns 200 with prerendered meta/JSON-LD or an honest 404 + noindex.
  location ~ ^/listings/([A-Za-z0-9_-]+)/?$ {
    rewrite ^/listings/([A-Za-z0-9_-]+)/?$ /api/v1/listings/$1/page break;
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Server-rendered catalog pages (organic-traffic landings): /fandoms/<slug>,
  # /genres/<slug>, /tags/<slug> and the index pages /fandoms, /genres, /tags.
  location ~ ^/(fandoms|genres|tags)/([A-Za-z0-9_-]+)/?$ {
    rewrite ^/(fandoms|genres|tags)/([A-Za-z0-9_-]+)/?$ /api/v1/catalog/$1/$2/page break;
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/(fandoms|genres|tags)/?$ {
    rewrite ^/(fandoms|genres|tags)/?$ /api/v1/catalog/$1/page break;
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /listing/ {
    try_files /listing/index.html =404;
  }

  # Server-rendered public profile (/profile/<username>, /profiles/<username>,
  # /u/<username>): proxied to the API so canonical/OG/Twitter carry the full
  # per-username URL and the listings count is rendered server-side. Honest 404.
  location ~ ^/(?:profile|profiles|u)/([A-Za-z0-9_-]+)/?$ {
    rewrite ^/(?:profile|profiles|u)/([A-Za-z0-9_-]+)/?$ /api/v1/profiles/$1/page break;
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # General API + WebSocket proxy. In production the system nginx routes /api/v1
  # and /ws straight to the API, so these are never reached here; they only matter
  # when the web container is served standalone (CI, e2e, local) — making it
  # self-sufficient so the SPA's client-side calls (login, listings, chat) work.
  location /api/v1/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  # Unknown routes return an honest 404 (no soft-200 homepage). Known SPA routes
  # are served by the explicit locations above; static files resolve via $uri.
  location / {
    try_files $uri =404;
  }

  location ~* \.(css|js|png|jpg|jpeg|webp|svg|ico|xml|txt)$ {
    try_files $uri =404;
    expires 1h;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cache-Control "public";
  }
}
