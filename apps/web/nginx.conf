server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Cache-Control "no-cache" always;

  error_page 404 /404.html;
  location = /404.html {
    internal;
    add_header Cache-Control "no-cache" always;
  }

  # Dynamic sitemap served by the API (published listings + static routes).
  location = /sitemap.xml {
    rewrite ^ /api/v1/sitemap.xml break;
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /index.html {
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cache-Control "no-cache";
  }

  location = / {
    try_files /index.html =404;
  }

  location = /favicon.ico {
    default_type image/svg+xml;
    try_files /favicon.svg =404;
  }

  location ~* \.(php|asp|aspx|jsp|cgi)$ {
    return 404;
  }

  location = /admin {
    auth_request /_cofind_staff_auth;
    error_page 401 = @cofind_auth_redirect;
    error_page 403 = @cofind_me_redirect;
    try_files /admin/index.html =404;
  }

  location = /admin/ {
    auth_request /_cofind_staff_auth;
    error_page 401 = @cofind_auth_redirect;
    error_page 403 = @cofind_me_redirect;
    try_files /admin/index.html =404;
  }

  location = /_cofind_staff_auth {
    internal;
    proxy_pass http://api:4000/api/v1/auth/require-staff;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Original-URI $request_uri;
  }

  location @cofind_auth_redirect {
    return 302 https://$host/auth;
  }

  location @cofind_me_redirect {
    return 302 https://$host/me;
  }

  location ~ ^/(feed|chat|auth|suggestions|help|rules|privacy|contacts)/?$ {
    try_files /$1/index.html =404;
  }

  location = /me {
    try_files /me/index.html =404;
  }

  location = /me/appearance {
    try_files /me/appearance/index.html =404;
  }

  location = /me/listings/new {
    try_files /me/listings/new/index.html =404;
  }

  location = /me/inbox {
    try_files /me/inbox/index.html =404;
  }

  location = /me/subscription {
    try_files /me/subscription/index.html =404;
  }

  location = /reports/new {
    try_files /reports/new/index.html =404;
  }

  # Server-rendered listing detail page (/listings/<slug>): proxied to the API,
  # which returns 200 with prerendered meta/JSON-LD or an honest 404 + noindex.
  location ~ ^/listings/([A-Za-z0-9_-]+)/?$ {
    rewrite ^/listings/([A-Za-z0-9_-]+)/?$ /api/v1/listings/$1/page break;
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /listing/ {
    try_files /listing/index.html =404;
  }

  location ^~ /profile/ {
    try_files /profile/index.html =404;
  }

  location ^~ /profiles/ {
    try_files /profiles/index.html =404;
  }

  location ^~ /u/ {
    try_files /u/index.html =404;
  }

  # Unknown routes return an honest 404 (no soft-200 homepage). Known SPA routes
  # are served by the explicit locations above; static files resolve via $uri.
  location / {
    try_files $uri =404;
  }

  location ~* \.(css|js|png|jpg|jpeg|webp|svg|ico|xml|txt)$ {
    try_files $uri =404;
    expires 1h;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cache-Control "public";
  }
}
