# Replace cofind.example.com and api.cofind.example.com with real domains.
# The web container listens on 127.0.0.1:3000 and the API container on 127.0.0.1:4000.

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  server_name cofind.example.com api.cofind.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name cofind.example.com;

  ssl_certificate /etc/letsencrypt/live/cofind.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cofind.example.com/privkey.pem;

  client_max_body_size 1m;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name api.cofind.example.com;

  ssl_certificate /etc/letsencrypt/live/api.cofind.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.cofind.example.com/privkey.pem;

  client_max_body_size 1m;

  location /ws/chat {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 300s;
  }

  location /api/v1/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
